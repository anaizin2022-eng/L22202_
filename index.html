        options: ["Min-Max 正規化", "Z-score 標準化", "穩健標準化 (Robust Scaling)", "對數轉換"],
        correct: 2, explanation: "穩健標準化 (Robust Scaling) 拋棄了易受影響的平均數，改用中位數與 IQR，是專門對付極端值的終極武器！"
      },
      {
        id: 2, text: "要處理包含1000個不同「郵遞區號」的特徵時，小熊「絕對不能」用哪種編碼方法？",
        options: ["標籤編碼 (Label Encoding)", "目標編碼 (Target Encoding)", "獨熱編碼 (One-hot Encoding)", "頻率編碼 (Frequency Encoding)"],
        correct: 2, explanation: "這是高基數(High Cardinality)欄位，用 One-hot 會暴增1000個欄位，導致維度災難！建議改用 Target Encoding。"
      },
      {
        id: 3, text: "小熊要處理「信用卡盜刷資料（盜刷1筆：正常999筆）」這種極度不平衡的狀況，該用什麼神技？",
        options: ["Min-Max 縮放", "SMOTE (合成少數過採樣)", "K-Means 分箱", "獨熱編碼"],
        correct: 1, explanation: "SMOTE (Synthetic Minority Oversampling Technique) 是處理不平衡資料、自動合成少數類別樣本的神器！"
      },
      {
        id: 4, text: "老闆要求做一個「當下一刷卡就立刻警報」的即時防詐騙系統，小熊該幫他選哪一種蜂蜜(分散式框架)？",
        options: ["Apache Hadoop", "Apache Flink", "Apache Airflow", "資料倉儲"],
        correct: 1, explanation: "看到「即時、當下立刻」，就要選原生支援即時串流(Real-time Streaming)的 Apache Flink (衝浪口味蜂蜜)。Hadoop 只能做批次。"
      },
      {
        id: 5, text: "小熊想「不靠模型」，純粹用統計的「相關係數」來快速篩選特徵，這叫做什麼特徵選擇法？",
        options: ["過濾法 (Filter Method)", "包裝法 (Wrapper Method)", "嵌入法 (Embedded Method)", "PCA 降維"],
        correct: 0, explanation: "過濾法(Filter)特色就是「不丟進模型訓練」，純粹看皮爾森相關係數或卡方檢定等統計量來篩選，最快但也最粗糙。"
      },
      {
        id: 6, text: "處理「教育程度（國小、國中、高中...）」這種有明顯高低順序的資料，最適合哪種編碼？",
        options: ["獨熱編碼 (One-hot Encoding)", "標籤編碼 (Label Encoding)", "目標編碼 (Target Encoding)", "哈希編碼 (Hash Encoding)"],
        correct: 1, explanation: "學歷屬於「有序類別(Ordinal Variable)」，適合用 Label Encoding 轉成 1,2,3，保留其大小順序的邏輯。"
      },
      {
        id: 7, text: "小熊將「消費頻率」與「平均消費金額」相乘，衍生出「年度總消費」這個新欄位，這屬於哪種特徵工程？",
        options: ["時間特徵", "聚合特徵", "交互特徵 (Interaction Feature)", "分箱"],
        correct: 2, explanation: "透過現有特徵間的數學運算（如乘積、除法）產生新特徵，稱為交互特徵，能幫模型抓出非線性關係。"
      },
      {
        id: 8, text: "哪一種分散式框架(蜂蜜)的特色是採用「記憶體內運算 (In-memory)」，處理速度超級快？",
        options: ["Apache Flink", "Apache Beam", "Apache Spark", "Apache Airflow"],
        correct: 2, explanation: "Apache Spark 的最大賣點就是 In-memory Processing，速度極快，且內建 MLlib 可以直接做機器學習。"
      },
      {
        id: 9, text: "小熊在做目標編碼 (Target Encoding) 時，最需要小心防範哪種可怕的問題？",
        options: ["維度災難", "資料稀疏性", "資料洩漏 (Data Leakage)", "記憶體不足"],
        correct: 2, explanation: "目標編碼用到「目標答案(Target)」來計算平均，很容易不小心把測試集的答案也算進去，引發嚴重的資料洩漏作弊行為！"
      },
      {
        id: 10, text: "資料處理管線中，把大任務切碎、定期啟動，並確保「當掉時能自動重試」，這需要哪種管線工具來指揮？",
        options: ["Apache Airflow", "Apache Hadoop", "SMOTE", "Redis"],
        correct: 0, explanation: "Apache Airflow 是最著名的資料處理管線(Pipeline)自動化排程與監控工具，就像總指揮官負責協調大家。"
      }
    ];

    function BearGame() {
      const [gameState, setGameState] = useState('start'); 
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [currentTutorialIndex, setCurrentTutorialIndex] = useState(0);
      const [currentGalleryIndex, setCurrentGalleryIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [hp, setHp] = useState(3);
      const [bearEmotion, setBearEmotion] = useState('🐻'); 
      const [feedback, setFeedback] = useState(null);

      const [shuffledQuestions, setShuffledQuestions] = useState([]);

      const initGame = () => {
        const shuffled = [...questions].sort(() => Math.random() - 0.5);
        setShuffledQuestions(shuffled);
        setCurrentQIndex(0);
        setScore(0);
        setHp(3);
        setBearEmotion('🐻');
        setGameState('playing');
      };

      const handleAnswer = (selectedIndex) => {
        const currentQuestion = shuffledQuestions[currentQIndex];
        const isCorrect = selectedIndex === currentQuestion.correct;

        if (isCorrect) {
          setScore(prev => prev + 10);
          setBearEmotion('🍯'); 
          setFeedback({
            isCorrect: true,
            msg: "太棒了！小熊吃到一口甜甜的蜂蜜 🍯",
            explanation: currentQuestion.explanation
          });
        } else {
          setHp(prev => prev - 1);
          setBearEmotion('🤕'); 
          setFeedback({
            isCorrect: false,
            msg: "哎呀！小熊被資料怪獸絆倒了 💥",
            explanation: currentQuestion.explanation
          });
        }
        setGameState('result');
      };

      const nextQuestion = () => {
        if (hp <= 0) {
          setGameState('end');
          setBearEmotion('😵');
          return;
        }
        
        if (currentQIndex + 1 < shuffledQuestions.length) {
          setCurrentQIndex(prev => prev + 1);
          setBearEmotion('🐻');
          setGameState('playing');
          setFeedback(null);
        } else {
          setGameState('end');
          setBearEmotion('🧸'); 
        }
      };

      const StartScreen = () => (
        <div className="flex flex-col items-center justify-center h-full text-center p-6 bg-gradient-to-b from-amber-100 to-amber-300 rounded-3xl shadow-xl">
          <div className="text-8xl mb-4 animate-bounce">🐻</div>
          <h1 className="text-3xl font-extrabold text-amber-800 mb-2">數據小熊熊歷險記</h1>
          <p className="text-amber-900 mb-6 font-medium px-4">
            L22203 數據處理技術與工具<br/>陪著小熊一起整理特徵，打敗考試魔王！
          </p>
          
          <div className="flex flex-col w-full max-w-sm gap-3">
            <button 
              onClick={() => {
                setCurrentGalleryIndex(0);
                setBearEmotion('🤩');
                setGameState('gallery');
              }}
              className="w-full px-6 py-4 bg-sky-500 text-white font-bold text-lg rounded-2xl shadow-lg hover:bg-sky-600 hover:scale-105 transition-all relative overflow-hidden group"
            >
              <span className="absolute -top-2 -right-2 text-2xl group-hover:animate-ping">✨</span>
              🖼️ 熊熊圖解教室 <span className="text-sm block font-normal mt-1">10 張超難記名詞秒懂圖卡</span>
            </button>

            <button 
              onClick={() => {
                setCurrentTutorialIndex(0);
                setBearEmotion('🤓');
                setGameState('tutorial');
              }}
              className="w-full px-6 py-4 bg-emerald-500 text-white font-bold rounded-2xl shadow-lg hover:bg-emerald-600 hover:scale-105 transition-all"
            >
              📖 讀「熊之卷」總整理
            </button>

            <button 
              onClick={initGame}
              className="w-full px-6 py-4 bg-amber-600 text-white font-bold rounded-2xl shadow-lg hover:bg-amber-700 hover:scale-105 transition-all"
            >
              🚀 進入實戰測驗
            </button>
          </div>
        </div>
      );

      const GalleryScreen = () => {
        const vc = visualConcepts[currentGalleryIndex];
        return (
          <div className={`flex flex-col h-full rounded-3xl shadow-xl p-4 md:p-8 border-4 ${vc.theme} bg-white transition-colors duration-500`}>
            {/* Header - Fixed */}
            <div className="flex justify-between items-center mb-4 flex-shrink-0">
              <button 
                onClick={() => setGameState('start')}
                className={`font-bold hover:opacity-70 ${vc.textTheme}`}
              >
                ← 返回森林
              </button>
              <div className={`font-bold px-4 py-2 rounded-full shadow-sm bg-white border-2 ${vc.theme} ${vc.textTheme}`}>
                圖解 {currentGalleryIndex + 1} / {visualConcepts.length}
              </div>
            </div>

            {/* Scrollable Content Area */}
            <div className={`flex-grow flex flex-col items-center justify-start text-center p-4 rounded-2xl ${vc.theme} bg-opacity-20 overflow-y-auto`}>
              <span className="text-sm font-black uppercase tracking-widest bg-white px-3 py-1 rounded-full shadow-sm mb-4 shrink-0">
                {vc.chapter}
              </span>
              <h2 className={`text-3xl md:text-4xl font-black mb-2 shrink-0 ${vc.textTheme}`}>
                {vc.title}
              </h2>
              
              <div className="w-full bg-white rounded-2xl shadow-inner my-4 min-h-[160px] flex items-center justify-center overflow-hidden shrink-0">
                 {vc.visual}
              </div>

              <p className="text-sm md:text-base font-medium text-slate-700 leading-relaxed text-left bg-white p-4 rounded-xl shadow-sm border border-slate-200 shrink-0">
                {vc.description}
              </p>
              
              <div className="mt-4 w-full text-left bg-amber-50 p-4 rounded-xl border-2 border-amber-200 shrink-0">
                <p className="text-amber-800 font-bold leading-relaxed text-sm md:text-base">
                  {vc.bearTip}
                </p>
              </div>
            </div>

            {/* Footer Buttons - Fixed at bottom */}
            <div className="flex justify-between gap-3 mt-4 flex-shrink-0">
              <button
                onClick={() => setCurrentGalleryIndex(prev => Math.max(0, prev - 1))}
                disabled={currentGalleryIndex === 0}
                className={`px-6 py-3 font-bold rounded-xl transition-all ${currentGalleryIndex === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-slate-700 shadow-sm hover:bg-slate-100 border border-slate-300'}`}
              >
                上一張
              </button>
              
              {currentGalleryIndex < visualConcepts.length - 1 ? (
                <button
                  onClick={() => setCurrentGalleryIndex(prev => Math.min(visualConcepts.length - 1, prev + 1))}
                  className={`px-6 py-3 text-white font-bold rounded-xl shadow-md transition-all flex-grow text-center ${vc.textTheme.replace('text', 'bg')} hover:opacity-80`}
                >
                  下一張 ➡️
                </button>
              ) : (
                <button
                  onClick={() => setGameState('start')}
                  className="px-6 py-3 bg-sky-500 text-white font-bold rounded-xl shadow-md hover:bg-sky-600 transition-all flex-grow text-center animate-pulse"
                >
                  ✨ 我記住了！回首頁
                </button>
              )}
            </div>
          </div>
        );
      };

      const TutorialScreen = () => {
        const t = tutorials[currentTutorialIndex];
        return (
          <div className="flex flex-col h-full bg-emerald-50 rounded-3xl shadow-xl p-4 md:p-8 border-4 border-emerald-100">
            <div className="flex justify-between items-center mb-4 flex-shrink-0">
              <button 
                onClick={() => setGameState('start')}
                className="text-emerald-700 font-bold hover:text-emerald-900 bg-emerald-100 px-4 py-2 rounded-lg"
              >
                ← 返回森林
              </button>
              <div className="font-bold text-emerald-800 bg-emerald-200 px-4 py-2 rounded-full shadow-sm">
                進度 {currentTutorialIndex + 1} / {tutorials.length}
              </div>
            </div>

            <div className="flex justify-center mb-2 flex-shrink-0">
              <div className="text-7xl drop-shadow-md">{bearEmotion}</div>
            </div>

            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-md border-b-4 border-emerald-300 flex-grow overflow-y-auto mb-6">
              <h2 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3 border-b-2 border-emerald-100 pb-3">
                <span className="text-4xl">{t.icon}</span>
                {t.title}
              </h2>
              <div className="space-y-4">
                {t.content.map((point, idx) => (
                  <p key={idx} className="text-lg text-slate-700 leading-relaxed font-medium bg-emerald-50/70 p-4 rounded-xl border border-emerald-100 shadow-sm">
                    {point}
                  </p>
                ))}
              </div>
            </div>

            <div className="flex justify-between gap-3 flex-shrink-0">
              <button
                onClick={() => setCurrentTutorialIndex(prev => Math.max(0, prev - 1))}
                disabled={currentTutorialIndex === 0}
                className={`px-6 py-3 font-bold rounded-xl transition-all ${currentTutorialIndex === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-emerald-700 shadow-sm hover:bg-emerald-100 border border-emerald-200'}`}
              >
                上一頁
              </button>
              
              {currentTutorialIndex < tutorials.length - 1 ? (
                <button
                  onClick={() => setCurrentTutorialIndex(prev => Math.min(tutorials.length - 1, prev + 1))}
                  className="px-6 py-3 bg-emerald-500 text-white font-bold rounded-xl shadow-md hover:bg-emerald-600 transition-all flex-grow text-center"
                >
                  下一頁 ➡️
                </button>
              ) : (
                <button
                  onClick={initGame}
                  className="px-6 py-3 bg-amber-500 text-white font-bold rounded-xl shadow-md hover:bg-amber-600 transition-all flex-grow text-center animate-pulse"
                >
                  🐾 準備好打怪了！
                </button>
              )}
            </div>
          </div>
        );
      };

      const PlayingScreen = () => {
        const q = shuffledQuestions[currentQIndex];
        return (
          <div className="flex flex-col h-full bg-amber-50 rounded-3xl shadow-xl p-4 md:p-8 border-4 border-amber-100">
            <div className="flex justify-between items-center mb-6 bg-white p-3 rounded-2xl shadow-sm border-2 border-amber-200 flex-shrink-0">
              <div className="flex space-x-1 text-2xl">
                {[...Array(3)].map((_, i) => (
                  <span key={i} className={i < hp ? 'opacity-100 drop-shadow-sm' : 'opacity-30 grayscale'}>❤️</span>
                ))}
              </div>
              <div className="font-bold text-amber-700 text-xl bg-amber-100 px-4 py-1 rounded-full">
                🍯 蜂蜜: {score}
              </div>
            </div>

            <div className="flex justify-center mb-6 flex-shrink-0">
              <div className="text-8xl transition-all duration-300 hover:scale-110 cursor-pointer drop-shadow-lg">
                {bearEmotion}
              </div>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-md border-b-4 border-amber-300 mb-6 flex-grow flex flex-col justify-center relative overflow-y-auto">
               <div className="absolute top-0 right-0 opacity-5 text-9xl -mt-4 -mr-4 pointer-events-none">🐻</div>
              <div className="text-sm text-amber-500 font-bold mb-2 uppercase tracking-widest z-10">挑戰關卡 {currentQIndex + 1} / {questions.length}</div>
              <h2 className="text-xl font-bold text-slate-800 leading-relaxed z-10">
                {q.text}
              </h2>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 flex-shrink-0">
              {q.options.map((opt, idx) => (
                <button
                  key={idx}
                  onClick={() => handleAnswer(idx)}
                  className="p-4 bg-yellow-50/80 hover:bg-amber-100 border-2 border-amber-200 rounded-xl text-left font-bold text-slate-700 transition-all hover:-translate-y-1 hover:shadow-md active:translate-y-0"
                >
                  {opt}
                </button>
              ))}
            </div>
          </div>
        );
      };

      const ResultScreen = () => (
        <div className={`flex flex-col h-full rounded-3xl shadow-xl p-6 md:p-8 text-center justify-center transition-all overflow-y-auto ${feedback.isCorrect ? 'bg-emerald-50 border-4 border-emerald-300' : 'bg-rose-50 border-4 border-rose-300'}`}>
          <div className="text-9xl mb-6 animate-pulse drop-shadow-xl shrink-0">{bearEmotion}</div>
          
          <h2 className={`text-3xl font-extrabold mb-4 shrink-0 ${feedback.isCorrect ? 'text-emerald-700' : 'text-rose-600'}`}>
            {feedback.msg}
          </h2>
          
          <div className="bg-white p-6 rounded-2xl shadow-sm mb-8 text-left border-l-4 border-slate-300 shrink-0">
            <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wide mb-2 flex items-center gap-2">
               <span>🐾</span> 知識點解析
            </h3>
            <p className="text-lg font-medium text-slate-800 leading-relaxed">
              {feedback.explanation}
            </p>
          </div>

          <button 
            onClick={nextQuestion}
            className={`px-8 py-4 font-bold rounded-full shadow-lg text-white transition-all hover:scale-105 active:scale-95 shrink-0 ${feedback.isCorrect ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-rose-500 hover:bg-rose-600'}`}
          >
            {hp <= 0 ? '小熊累了，遊戲結束 🤕' : (currentQIndex + 1 === questions.length ? '查看結算成績 🏆' : '繼續前進 🐾')}
          </button>
        </div>
      );

      const EndScreen = () => {
        const isWin = hp > 0;
        const isPerfect = score === questions.length * 10;
        
        let endMessage = "";
        let endMascot = "";
        
        if (isPerfect) {
          endMessage = "滿分通關！你已經是特徵工程大師熊了！";
          endMascot = "👑🧸👑";
        } else if (isWin) {
          endMessage = "恭喜通關！大部分的特徵魔法都掌握囉！";
          endMascot = "🎉🐻🎉";
        } else {
          endMessage = "被陷阱打敗了...沒關係，去圖解教室補血吧！";
          endMascot = "🩹🤕🩹";
        }

        return (
          <div className="flex flex-col items-center justify-center h-full text-center p-6 bg-gradient-to-b from-amber-200 to-orange-300 rounded-3xl shadow-xl border-4 border-amber-100 overflow-y-auto">
            <div className="text-8xl mb-6 drop-shadow-xl shrink-0">{endMascot}</div>
            <h1 className="text-4xl font-extrabold text-amber-900 mb-2 shrink-0">探險結束</h1>
            <p className="text-xl font-bold text-amber-800 mb-6 shrink-0">{endMessage}</p>
            
            <div className="bg-white/90 p-6 rounded-2xl shadow-md mb-8 w-full max-w-sm border-2 border-amber-100 shrink-0">
              <div className="flex justify-between items-center mb-4 pb-4 border-b-2 border-amber-100">
                <span className="text-slate-600 font-bold text-lg">總獲得蜂蜜:</span>
                <span className="text-3xl font-black text-amber-600">{score} 分</span>
              </div>
              <div className="flex justify-between items-center">
                <span className="text-slate-600 font-bold text-lg">剩餘生命值:</span>
                <span className="text-2xl drop-shadow-sm">{[...Array(hp)].map((_, i) => '❤️').join('') || '💔'}</span>
              </div>
            </div>

            <div className="flex flex-col sm:flex-row gap-4 w-full max-w-sm justify-center shrink-0">
               <button 
                onClick={() => {
                  setCurrentGalleryIndex(0);
                  setBearEmotion('🤩');
                  setGameState('gallery');
                }}
                className="px-6 py-3 bg-sky-500 text-white font-bold rounded-full shadow-md hover:bg-sky-600 transition-all"
              >
                🖼️ 看圖解複習
              </button>
              <button 
                onClick={() => setGameState('start')}
                className="px-6 py-3 bg-amber-600 text-white font-bold rounded-full shadow-md hover:bg-amber-700 transition-all"
              >
                🏠 回森林首頁
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 font-sans">
          <div className="w-full max-w-2xl h-[700px] bg-white rounded-3xl shadow-2xl p-2 relative overflow-hidden flex flex-col">
            {gameState === 'start' && <StartScreen />}
            {gameState === 'gallery' && <GalleryScreen />}
            {gameState === 'tutorial' && <TutorialScreen />}
            {gameState === 'playing' && <PlayingScreen />}
            {gameState === 'result' && <ResultScreen />}
            {gameState === 'end' && <EndScreen />}
          </div>
        </div>
      );
    }

    // 將 React 元件渲染到 HTML 中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BearGame />);
  </script>
</body>
</html>
